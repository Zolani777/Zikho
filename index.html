<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#050505" />
  <title>For Zikho ✨</title>
  <style>
    :root{
      --bg:#050505;
      --text:#f7f7fb;
      --muted:rgba(255,255,255,.74);
      --line:rgba(255,255,255,.10);
      --safe-top:max(env(safe-area-inset-top), 16px);
      --safe-right:max(env(safe-area-inset-right), 16px);
      --safe-bottom:max(env(safe-area-inset-bottom), 16px);
      --safe-left:max(env(safe-area-inset-left), 16px);
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;touch-action:manipulation;overscroll-behavior:none;cursor:pointer;
      background:
        radial-gradient(circle at 18% 20%, rgba(0,229,255,.09), transparent 23%),
        radial-gradient(circle at 82% 18%, rgba(124,77,255,.10), transparent 28%),
        radial-gradient(circle at 50% 82%, rgba(255,64,129,.07), transparent 26%),
        #050505;
      color:var(--text);
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Arial,sans-serif;
      -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
    }
    body{position:fixed;inset:0}
    #fx{position:fixed;inset:0;width:100%;height:100%;display:block;z-index:0}
    .vignette,.ambient{position:fixed;inset:0;pointer-events:none}
    .vignette{z-index:1;background:radial-gradient(circle at 50% 42%, transparent 0%, rgba(0,0,0,.08) 52%, rgba(0,0,0,.54) 100%)}
    .ambient{
      z-index:1;
      background:
        radial-gradient(circle at 50% 52%, rgba(255,255,255,.06), transparent 20%),
        radial-gradient(circle at 50% 44%, rgba(0,229,255,.04), transparent 33%);
      mix-blend-mode:screen;opacity:.9
    }
    main{
      position:fixed;inset:0;z-index:2;display:grid;grid-template-rows:1fr auto 1fr;align-items:center;pointer-events:none;
      padding:calc(var(--safe-top) + 12px) calc(var(--safe-right) + 14px) calc(var(--safe-bottom) + 14px) calc(var(--safe-left) + 14px);
    }
    .top{align-self:start;justify-self:center;text-align:center;margin-top:4px}
    .tag{
      display:inline-block;padding:8px 12px;border-radius:999px;border:1px solid var(--line);
      background:rgba(255,255,255,.05);color:rgba(255,255,255,.86);font-size:12px;letter-spacing:.04em;
      backdrop-filter:blur(10px);box-shadow:0 12px 30px rgba(0,0,0,.18);animation:softFloat 5.8s ease-in-out infinite
    }
    .title{margin:16px 0 0;font-size:clamp(34px,8vw,62px);line-height:1.02;letter-spacing:-.04em;text-shadow:0 0 28px rgba(255,255,255,.08)}
    .center{width:min(100%,720px);justify-self:center;align-self:center;display:grid;place-items:center;min-height:min(48dvh,420px)}
    .message-shell{
      width:min(100%,640px);border-radius:34px;padding:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);
      box-shadow:0 24px 80px rgba(0,0,0,.36), inset 0 1px 0 rgba(255,255,255,.06);
      position:relative;overflow:hidden;animation:softFloat 6.2s ease-in-out infinite
    }
    .message-shell::before{
      content:"";position:absolute;inset:-10%;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.10), transparent 18%),
        radial-gradient(circle at 0% 100%, rgba(0,229,255,.07), transparent 22%),
        radial-gradient(circle at 100% 0%, rgba(124,77,255,.08), transparent 24%);
      filter:blur(22px);pointer-events:none
    }
    .message-wrap{position:relative;z-index:1;min-height:230px;display:grid;place-items:center;padding:8px 10px}
    .message{
      max-width:17ch;text-align:center;font-size:clamp(23px,5vw,33px);line-height:1.24;font-weight:660;letter-spacing:-.02em;
      white-space:pre-line;text-wrap:balance;filter:drop-shadow(0 0 18px rgba(255,255,255,.05));will-change:transform,opacity,filter
    }
    .message.enter{animation:messageEnter .82s cubic-bezier(.22,.84,.2,1)}
    .message.exit{animation:messageExit .38s cubic-bezier(.4,0,.2,1) forwards}
    @keyframes messageEnter{0%{opacity:0;transform:translateY(20px) scale(.972);filter:blur(10px)}100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
    @keyframes messageExit{0%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}100%{opacity:0;transform:translateY(-12px) scale(.988);filter:blur(7px)}}
    .bottom{align-self:end;justify-self:center;text-align:center;width:min(100%,560px);color:var(--muted)}
    .sub{margin:0;font-size:14px;line-height:1.45}
    .tap{margin-top:14px;font-size:13px;color:rgba(255,255,255,.84);letter-spacing:.04em;text-transform:lowercase;animation:pulse 1.9s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:.38}50%{opacity:1}}
    @keyframes softFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @media (max-width:640px){
      main{padding:calc(var(--safe-top) + 10px) calc(var(--safe-right) + 10px) calc(var(--safe-bottom) + 12px) calc(var(--safe-left) + 10px)}
      .title{font-size:clamp(34px,11vw,54px);margin-top:14px}
      .message-shell{border-radius:28px;padding:14px}
      .message-wrap{min-height:210px;padding:12px 8px}
      .message{max-width:15ch;font-size:clamp(24px,6vw,31px)}
      .sub{max-width:28ch;margin:0 auto;font-size:13px}
    }
    @media (max-height:740px){.message-wrap{min-height:186px}.title{font-size:clamp(32px,8vw,52px)}}
    @media (prefers-reduced-motion: reduce){.tag,.message-shell,.tap,.message.enter,.message.exit{animation:none}}
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div class="vignette"></div>
  <div class="ambient"></div>
  <main>
    <div class="top">
      <div class="tag">just for Zikho ✨</div>
      <h1 class="title">Hey Zikho</h1>
    </div>
    <div class="center">
      <div class="message-shell" aria-label="Message for Zikho">
        <div class="message-wrap">
          <div id="message" class="message enter">Loading…</div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <p class="sub">A small thing I made for you.</p>
      <div class="tap">tap anywhere</div>
    </div>
  </main>
  <script>
    (function () {
      const canvas = document.getElementById("fx");
      const ctx = canvas.getContext("2d");
      const messageEl = document.getElementById("message");

      const storyline = [
`Hey Zikho 🌙

Couldn’t say this properly earlier

so I made this
for you.`,

`You said
you don’t like
small talk…

so I skipped it.`,

`I realised something.

We already have
memories.`,

`Mandalay.

Park meets.

That’s rare.`,

`Out of everyone there,

you stood out
to me first.`,

`Not in a big
dramatic way.

Just naturally.`,

`Talking to you

always felt
easy.`,

`That’s probably why

I still remember
the small moments.`,

`I’d like us

to keep talking
properly.`,

`Anyway…

this is me saying
hi the right way 🙂`,

`Goodnight Zikho 🌙`
      ];

      let messageIndex = 0;
      let switching = false;

      function nextMessage(){
        messageIndex = (messageIndex + 1) % storyline.length;
        return storyline[messageIndex];
      }

      function showMessage(text, immediate = false){
        if (switching && !immediate) return;
        if (immediate) {
          messageEl.textContent = text;
          messageEl.className = "message enter";
          return;
        }
        switching = true;
        messageEl.classList.remove("enter");
        messageEl.classList.add("exit");
        setTimeout(() => {
          messageEl.textContent = text;
          messageEl.classList.remove("exit");
          void messageEl.offsetWidth;
          messageEl.classList.add("enter");
          setTimeout(() => { switching = false; }, 620);
        }, 300);
      }

      let w = 0, h = 0, dpr = 1;
      const stars = [], particles = [], comets = [], orbs = [];
      const palettes = [
        ["#00E5FF", "#7C4DFF", "#FF4081", "#FFD600", "#80D8FF"],
        ["#80D8FF", "#7C4DFF", "#FFD600", "#FF4081", "#00E5FF"],
        ["#FF4081", "#00E5FF", "#80D8FF", "#FFD600", "#7C4DFF"]
      ];

      function rand(min, max){ return min + Math.random() * (max - min); }
      function pick(arr){ return arr[(Math.random() * arr.length) | 0]; }

      function buildStars(){
        stars.length = 0;
        orbs.length = 0;
        const count = Math.max(84, Math.floor((w * h) / 18000));
        for (let i = 0; i < count; i++) {
          stars.push({ x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.5 + 0.35, a: Math.random() * 0.55 + 0.15, tw: Math.random() * 0.02 + 0.005 });
        }
        for (let i = 0; i < 14; i++) {
          orbs.push({ x: Math.random() * w, y: Math.random() * h, r: rand(26, 56), a: rand(0.03, 0.08), dx: rand(-0.12, 0.12), dy: rand(-0.08, 0.08), color: pick(["#00E5FF", "#7C4DFF", "#FF4081", "#FFD600"]) });
        }
      }

      function resize(){
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        w = window.innerWidth; h = window.innerHeight;
        canvas.width = Math.floor(w * dpr); canvas.height = Math.floor(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        buildStars();
      }

      function burst(x, y, amount){
        const palette = pick(palettes);
        for (let i = 0; i < amount; i++) {
          const angle = Math.random() * Math.PI * 2;
          const speed = Math.random() * 4.7 + 1.5;
          particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, life: 1, decay: Math.random() * 0.018 + 0.011, size: Math.random() * 2.6 + 1.1, color: pick(palette) });
        }
      }

      function launchComet(tx, ty){
        const startX = tx + rand(-90, 90), startY = h + 36, frames = 32 + ((Math.random() * 10) | 0);
        comets.push({ x: startX, y: startY, vx: (tx - startX) / frames, vy: (ty - startY) / frames, life: frames, maxLife: frames, tx, ty });
      }

      function launchShow(baseX = w * 0.5, baseY = h * 0.33){
        launchComet(baseX, baseY);
        setTimeout(() => launchComet(w * 0.34 + Math.random() * 100, h * 0.29 + Math.random() * 45), 220);
        setTimeout(() => launchComet(w * 0.60 + Math.random() * 95, h * 0.26 + Math.random() * 55), 440);
      }

      function animate(){
        ctx.clearRect(0, 0, w, h);

        for (const o of orbs) {
          o.x += o.dx; o.y += o.dy;
          if (o.x < -60) o.x = w + 60; if (o.x > w + 60) o.x = -60;
          if (o.y < -60) o.y = h + 60; if (o.y > h + 60) o.y = -60;
          ctx.save(); ctx.globalAlpha = o.a; ctx.fillStyle = o.color; ctx.filter = "blur(18px)"; ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        for (const s of stars) {
          s.a += (Math.random() - 0.5) * s.tw; s.a = Math.max(0.12, Math.min(0.8, s.a));
          ctx.globalAlpha = s.a; ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
        }
        ctx.globalAlpha = 1;

        for (let i = comets.length - 1; i >= 0; i--) {
          const c = comets[i]; c.x += c.vx; c.y += c.vy; c.life -= 1;
          const alpha = Math.max(c.life / c.maxLife, 0);
          ctx.save(); ctx.globalCompositeOperation = "screen"; ctx.globalAlpha = alpha * 0.18; ctx.fillStyle = "#ffffff"; ctx.beginPath(); ctx.arc(c.x, c.y, 11, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = alpha; ctx.beginPath(); ctx.arc(c.x, c.y, 2.2, 0, Math.PI * 2); ctx.fill(); ctx.restore();
          if (c.life <= 0) { burst(c.tx, c.ty, 90 + ((Math.random() * 24) | 0)); comets.splice(i, 1); }
        }

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vx *= 0.987; p.vy = p.vy * 0.987 + 0.045; p.life -= p.decay;
          if (p.life <= 0) { particles.splice(i, 1); continue; }
          ctx.save(); ctx.globalCompositeOperation = "screen"; ctx.globalAlpha = p.life * 0.22; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size * 4.6, 0, Math.PI * 2); ctx.fill();
          ctx.globalAlpha = p.life; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        requestAnimationFrame(animate);
      }

      function trigger(x, y){
        showMessage(nextMessage());
        launchComet(x, y);
        if (Math.random() < 0.72) setTimeout(() => launchComet(x + rand(-60, 60), y + rand(-30, 30)), 210);
      }

      function handleTap(event){
        const x = event.clientX || (w * 0.5);
        const y = Math.max(90, event.clientY || (h * 0.33));
        trigger(x, y);
      }

      document.addEventListener("click", handleTap, { passive:true });
      document.addEventListener("touchstart", (e) => {
        const t = e.touches && e.touches[0];
        if (t) handleTap({ clientX:t.clientX, clientY:t.clientY });
      }, { passive:true });

      window.addEventListener("resize", resize, { passive:true });

      resize();
      showMessage(storyline[0], true);
      animate();
      launchShow();
    })();
  </script>
</body>
</html>
